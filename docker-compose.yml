services:
  timekeeper:
    build: .
    container_name: timekeeper
    restart: unless-stopped
    environment:
      PORT: ${PORT:-3000}
      HOST: ${HOST:-0.0.0.0}
      DATABASE_PATH: ${DATABASE_PATH:-/app/data/timekeeper.sqlite}
      PUBLIC_APP_NAME: ${PUBLIC_APP_NAME:-Timekeeper}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./data:/app/data
